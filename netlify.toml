[build]
  command = "bash netlify-build.sh"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"

# =====================================================================
# NOTA: Todas las redirecciones se gestionan en public/_redirects
# (la sintaxis _redirects tiene prioridad sobre netlify.toml en Netlify
# y permite reglas más claras, como la captura de splats UTF-8).
# Solo conservamos aquí las reglas que requieren configuración avanzada.
# =====================================================================
